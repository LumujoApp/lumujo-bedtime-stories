<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMUJO Bedtime Stories</title>
  <!-- Puter.js Library for Free AI Story Generation -->
  <script src="https://js.puter.com/v2/"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0b132b, #1c2541, #0b0c10);
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .app-container {
      width: 100%;
      max-width: 550px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .app-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .app-header h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 6px;
      color: #4cc9f0;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a0aab2;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #4cc9f0;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    select option {
      background: #1c2541;
      color: #fff;
    }

    .primary-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #4895ef, #4361ee);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
      transition: transform 0.2s, opacity 0.2s;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .primary-btn:disabled {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .story-result-box {
      margin-top: 25px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      border-left: 3px solid #4cc9f0;
    }

    .story-text {
      font-size: 1rem;
      line-height: 1.7;
      color: #e0e6ed;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="glass-card">
      <header class="app-header">
        <h1>LUMUJO BEDTIME STORIES</h1>
        <p class="subtitle">Personalized AI-powered tales for bedtime</p>
      </header>

      <form id="storyForm">
        <!-- Main Character -->
        <div class="form-group">
          <label for="heroName">MAIN CHARACTER / HERO NAME</label>
          <input type="text" id="heroName" placeholder="e.g., Leo, Maya, Barnaby..." required>
        </div>

        <!-- Sidekick -->
        <div class="form-group">
          <label for="sidekick">SIDEKICK OR COMPANION</label>
          <select id="sidekick">
            <option value="Friendly Dragon">Friendly Dragon</option>
            <option value="Teddy Bear">Teddy Bear</option>
            <option value="Wise Owl">Wise Owl</option>
            <option value="Playful Puppy">Playful Puppy</option>
            <option value="Magical Robot">Magical Robot</option>
            <option value="Curious Kitten">Curious Kitten</option>
            <option value="Gentle Unicorn">Gentle Unicorn</option>
            <option value="Talking Tree">Talking Tree</option>
            <option value="Tiny Star Sprite">Tiny Star Sprite</option>
            <option value="Clever Fox">Clever Fox</option>
            <option value="Brave Little Mouse">Brave Little Mouse</option>
            <option value="Golden Retriever">Golden Retriever</option>
          </select>
        </div>

        <!-- Special Toy / Item -->
        <div class="form-group">
          <label for="favoriteToy">SPECIAL TOY OR MAGICAL ITEM</label>
          <select id="favoriteToy">
            <option value="Magic Wand">Magic Wand</option>
            <option value="Flying Blanket">Flying Blanket</option>
            <option value="Glowing Star Torch">Glowing Star Torch</option>
            <option value="Favorite Cuddly Bear">Favorite Cuddly Bear</option>
            <option value="Wooden Toy Train">Wooden Toy Train</option>
            <option value="Shiny Pocket Compass">Shiny Pocket Compass</option>
            <option value="Enchanted Storybook">Enchanted Storybook</option>
            <option value="Pocket Lantern">Pocket Lantern</option>
            <option value="Cozy Nightline Pillow">Cozy Nightline Pillow</option>
            <option value="Silver Whistle">Silver Whistle</option>
          </select>
        </div>

        <!-- Custom Details (Optional) -->
        <div class="form-group">
          <label for="customDetail">ANY EXTRA DETAILS OR SPECIAL REQUESTS (OPTIONAL)</label>
          <input type="text" id="customDetail" placeholder="e.g., loves space, taking a train, magical forest...">
        </div>

        <!-- Reading Level -->
        <div class="form-group">
          <label for="readingLevel">STORY COMPLEXITY / READING LEVEL</label>
          <select id="readingLevel">
            <option value="Early Listener (Short & Sweet)">Early Listener (Short & Sweet)</option>
            <option value="Young Reader (Enriching Words)">Young Reader (Enriching Words)</option>
            <option value="Imaginative Learner (Playful Plots)">Imaginative Learner (Playful Plots)</option>
            <option value="Bedtime Lullaby (Calm & Dreamy)">Bedtime Lullaby (Calm & Dreamy)</option>
          </select>
        </div>

        <!-- Moral Topic -->
        <div class="form-group">
          <label for="moralTopic">MORAL OR LESSON TOPIC</label>
          <select id="moralTopic">
            <option value="Kindness">Kindness</option>
            <option value="Sharing">Sharing</option>
            <option value="Being Brave">Being Brave</option>
            <option value="Patience">Patience</option>
            <option value="Curiosity">Curiosity</option>
            <option value="Honesty">Honesty</option>
            <option value="Perseverance">Perseverance</option>
            <option value="Gratitude">Gratitude</option>
            <option value="Listening to Parents">Listening to Parents</option>
            <option value="Empathy">Empathy</option>
          </select>
        </div>

        <button type="submit" id="generateBtn" class="primary-btn">
          ✨ GENERATE MAGIC STORY ✨
        </button>
      </form>

      <!-- Output Section -->
      <div id="storyResult" class="story-result-box">
        <div id="storyBody" class="story-text">
          Fill out the details above and click Generate Magic Story to begin!
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('storyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const hero = document.getElementById('heroName').value || 'Explorer';
      const sidekick = document.getElementById('sidekick').value;
      const favoriteToy = document.getElementById('favoriteToy').value;
      const customDetail = document.getElementById('customDetail').value;
      const readingLevel = document.getElementById('readingLevel').value;
      const moral = document.getElementById('moralTopic').value;

      const generateBtn = document.getElementById('generateBtn');
      const storyBody = document.getElementById('storyBody');

      generateBtn.disabled = true;
      generateBtn.innerText = 'Writing Story...';
      storyBody.innerText = '✨ Calling AI star systems to write your bedtime story... Please wait! ✨';

      let prompt = `Write a soothing, beautifully detailed bedtime story for children that is around 400-500 words long.
Main Character: ${hero}
Companion: ${sidekick}
Special Toy / Item: ${favoriteToy}
Reading Level: ${readingLevel}
Lesson/Moral: ${moral}`;

      if (customDetail.trim() !== "") {
        prompt += `\nAdditional Special Detail: ${customDetail}`;
      }

      prompt += `\n\nMake it multi-paragraph, comforting, and focused on the lesson of ${moral}. Weave the ${favoriteToy} naturally into their evening adventure. End with a sleepy, calming conclusion as ${hero} falls asleep safely in bed.`;

      try {
        const response = await puter.ai.chat(prompt);
        storyBody.innerText = response.toString().trim();
      } catch (err) {
        storyBody.innerText = `Once upon a time, ${hero} and ${sidekick} went on a peaceful evening walk bringing along their ${favoriteToy}. They spent a quiet night learning all about ${moral}. As the soft night wind blew, they tucked themselves into bed feeling safe, warm, and happy. The end.`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerText = '✨ GENERATE MAGIC STORY ✨';
      }
    });
  </script>
</body>
</html>
