<script>
  // Ensure '1' credit is explicitly initialized on first-ever visit
  if (localStorage.getItem('lumujo_credits') === null) {
    localStorage.setItem('lumujo_credits', '1');
  }

  let credits = parseInt(localStorage.getItem('lumujo_credits'), 10);
  let isUnlimited = localStorage.getItem('lumujo_unlimited') === 'true';

  const unsafeKeywords = [
    'kill', 'die', 'dead', 'murder', 'blood', 'gory', 'knife', 'gun', 'weapon', 'fight', 'war', 
    'hurt', 'abuse', 'hit', 'punch', 'scary', 'monster', 'ghost', 'demon', 'devil', 'hate', 
    'evil', 'poison', 'curse', 'threat', 'kidnap', 'choke', 'strike', 'nightmare'
  ];

  function isInputSafe(text) {
    const lower = text.toLowerCase();
    return !unsafeKeywords.some(keyword => lower.includes(keyword));
  }

  function updateBadge() {
    const badge = document.getElementById('creditBadge');
    if (!badge) return;

    if (isUnlimited) {
      badge.innerText = `Monthly Unlimited Active ✨`;
    } else if (credits > 0) {
      badge.innerText = `Free Story Remaining: ${credits}`;
    } else {
      badge.innerText = `0 Stories Remaining (Upgrade Below)`;
    }
  }

  updateBadge();

  function toggleOtherInput(selectId, inputId) {
    const select = document.getElementById(selectId);
    const input = document.getElementById(inputId);
    if (select.value === 'OTHER') {
      input.style.display = 'block';
      input.focus();
    } else {
      input.style.display = 'none';
    }
  }

  function getValue(selectId, inputId) {
    const select = document.getElementById(selectId);
    const input = document.getElementById(inputId);
    if (select.value === 'OTHER') {
      return input.value.trim() || 'Custom Option';
    }
    return select.value;
  }

  function showModal() {
    document.getElementById('paywallModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('paywallModal').classList.remove('active');
  }

  function selectPack(packAmount, planName) {
    if (packAmount === 999) {
      window.location.href = "https://buy.stripe.com/9B6dRa5xj2hF1AIco9bZe03";
    } else {
      window.location.href = "https://buy.stripe.com/eVqfZi5xj1dBenu87TbZe00";
    }
  }

  document.getElementById('storyForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const safetyBanner = document.getElementById('safetyWarning');
    safetyBanner.style.display = 'none';

    // Paywall Enforcement (Triggers ONLY when credits are completely exhausted)
    if (!isUnlimited && credits <= 0) {
      showModal();
      return;
    }

    const hero = document.getElementById('heroName').value || 'Explorer';
    const sidekick = getValue('sidekick', 'sidekickOther');
    const favoriteToy = getValue('favoriteToy', 'favoriteToyOther');
    const readingLevel = getValue('readingLevel', 'readingLevelOther');
    const moral = getValue('moralTopic', 'moralTopicOther');

    const allInputs = `${hero} ${sidekick} ${favoriteToy} ${readingLevel} ${moral}`;
    if (!isInputSafe(allInputs)) {
      safetyBanner.style.display = 'block';
      return;
    }

    const generateBtn = document.getElementById('generateBtn');
    const storyBody = document.getElementById('storyBody');

    generateBtn.disabled = true;
    generateBtn.innerText = 'Writing Story...';
    storyBody.innerText = '✨ Calling AI star systems to write your bedtime story... Please wait! ✨';

    const prompt = `You are a gentle, wholesome, and child-safe bedtime story writer. 

STRICT SAFETY & CONTENT GUARANTEES:
- This story MUST be completely safe, comforting, positive, and age-appropriate for young children.
- Absolutely NO violence, gore, weapons, abuse, fear, jump-scares, dark themes, or adult content under any circumstances.
- If any input seems questionable, ignore the negative undertones and turn it into a peaceful, gentle, happy story element.

STORY PARAMETERS:
Main Character: ${hero}
Companion: ${sidekick}
Special Toy / Item: ${favoriteToy}
Complexity Level / Constraints: ${readingLevel}
Lesson/Moral: ${moral}

AGE & COMPLEXITY ADJUSTMENTS:
- Adapt sentence structure, vocabulary, and length DIRECTLY to the specified complexity level (${readingLevel}).
- Early Listeners: Very short, simple, rhythmic, cozy sentences (~150-200 simple words). No complex vocabulary.
- Young Readers: Gentle plots and playful language (~250-350 words).
- Imaginative Learners: Richer, detailed, comforting narrative (~400-500 words).
- End with a sleepy, calming conclusion as ${hero} falls asleep safely in bed.`;

    try {
      const response = await puter.ai.chat(prompt);
      storyBody.innerText = response.toString().trim();
      
      // Deduct credit ONLY after a successful story is generated
      if (!isUnlimited) {
        credits = Math.max(0, credits - 1);
        localStorage.setItem('lumujo_credits', credits.toString());
      }
      updateBadge();
    } catch (err) {
      storyBody.innerText = `Once upon a time, ${hero} and ${sidekick} went on a peaceful evening walk bringing along their ${favoriteToy}. They spent a quiet night learning all about ${moral}. As the soft night wind blew, they tucked themselves into bed feeling safe, warm, and happy. The end.`;
    } finally {
      generateBtn.disabled = false;
      generateBtn.innerText = '✨ GENERATE MAGIC STORY ✨';
    }
  });
</script>
