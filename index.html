<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMUJO Bedtime Stories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="glass-card">
      <header class="app-header">
        <h1>LUMUJO BEDTIME STORIES</h1>
        <p class="subtitle">Personalized AI-powered tales for bedtime</p>
      </header>

      <form id="storyForm">
        <!-- Main Character -->
        <div class="form-group">
          <label for="heroName">MAIN CHARACTER / HERO NAME</label>
          <input type="text" id="heroName" placeholder="e.g., Leo, Maya, Barnaby..." required>
        </div>

        <!-- Sidekick -->
        <div class="form-group">
          <label for="sidekick">SIDEKICK OR COMPANION</label>
          <select id="sidekick">
            <option value="Friendly Dragon">Friendly Dragon</option>
            <option value="Teddy Bear">Teddy Bear</option>
            <option value="Wise Owl">Wise Owl</option>
            <option value="Playful Puppy">Playful Puppy</option>
            <option value="Magical Robot">Magical Robot</option>
          </select>
        </div>

        <!-- Reading Level -->
        <div class="form-group">
          <label for="readingLevel">STORY COMPLEXITY / READING LEVEL</label>
          <select id="readingLevel">
            <option value="Early Listener (Short & Sweet)">Early Listener (Short & Sweet)</option>
            <option value="Young Reader (Enriching Words)">Young Reader (Enriching Words)</option>
            <option value="Imaginative Learner (Playful Plots)">Imaginative Learner (Playful Plots)</option>
          </select>
        </div>

        <!-- Lesson / Moral -->
        <div class="form-group">
          <label for="moralTopic">MORAL OR LESSON TOPIC</label>
          <select id="moralTopic">
            <option value="Kindness">Kindness</option>
            <option value="Sharing">Sharing</option>
            <option value="Being Brave">Being Brave</option>
            <option value="Patience">Patience</option>
            <option value="Curiosity">Curiosity</option>
          </select>
        </div>

        <button type="submit" id="generateBtn" class="primary-btn">
          ✨ GENERATE MAGIC STORY ✨
        </button>
      </form>

      <!-- Output Section -->
      <div id="storyResult" class="story-result-box">
        <div id="storyBody" class="story-text">
          Fill out the details above and click Generate Magic Story to begin!
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('storyForm');
      const storyBody = document.getElementById('storyBody');
      const generateBtn = document.getElementById('generateBtn');

      if (!form) return;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const heroName = document.getElementById('heroName')?.value || 'a brave adventurer';
        const sidekick = document.getElementById('sidekick')?.value || 'a friendly dragon';
        const readingLevel = document.getElementById('readingLevel')?.value || 'Early Listener';
        const moralTopic = document.getElementById('moralTopic')?.value || 'Kindness';

        // Update UI to show loading state
        generateBtn.disabled = true;
        generateBtn.innerText = 'Generating Story...';
        storyBody.innerText = '✨ Your unique magic story is traveling from the AI star systems now... Please hold on a moment! ✨';

        try {
          const response = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
            method: "POST",
            headers: {
              "Authorization": "Bearer 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",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              inputs: `<|system|>\nYou are a warm, professional children's book author. Write a beautiful, calming bedtime story for children.\n<|user|>\nWrite a short bedtime story about ${heroName} and their companion ${sidekick}. Reading Level: ${readingLevel}. Lesson/Moral: ${moralTopic}.\n<|assistant|>\n`,
              parameters: { max_new_tokens: 400, temperature: 0.7 }
            })
          });

          const data = await response.json();
          let generatedText = '';

          if (Array.isArray(data) && data[0]?.generated_text) {
            generatedText = data[0].generated_text;
          } else if (data.generated_text) {
            generatedText = data.generated_text;
          }

          const cleanStory = generatedText.includes('<|assistant|>') 
            ? generatedText.split('<|assistant|>').pop().trim() 
            : generatedText.trim();

          storyBody.innerText = cleanStory || `Once upon a time, ${heroName} and ${sidekick} set out on a magical bedtime adventure...`;

        } catch (error) {
          // Fallback story if network/API drops
          storyBody.innerText = `Once upon a time, ${heroName} and ${sidekick} went on a beautiful twilight walk under the starlight. They spent a peaceful evening learning all about the magic of ${moralTopic}. As the soft night wind blew, they tucked themselves into bed, feeling safe, warm, and happy. The end.`;
        } finally {
          generateBtn.disabled = false;
          generateBtn.innerText = '✨ GENERATE MAGIC STORY ✨';
        }
      });
    });
  </script>
</body>
</html>
